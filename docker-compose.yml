version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: marketplace-db
    restart: always
    environment:
      MYSQL_DATABASE: freelance_db
      MYSQL_USER: marketplace_user
      MYSQL_PASSWORD: marketplace_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pRoot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: marketplace-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/freelance_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=marketplace_user
      - SPRING_DATASOURCE_PASSWORD=marketplace_password
      - JWT_SECRET=9a8b7c6d5e4f3g2h1i0j9k8l7m6n5o4p3q2r1s0t9u8v7w6x5y4z3a2b1c0d9e8f
      - UPLOAD_DIR=/var/freelance/uploads
    volumes:
      - upload_data:/var/freelance/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: marketplace-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
  upload_data:
